<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxean SA | Asher-Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .mesh-dot {
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .blur-orb {
            position: fixed;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="mesh-dot">
    <div class="blur-orb"></div>

    <nav class="p-8 flex justify-between items-center">
        <div class="font-bold tracking-widest text-sm">
            OXEAN <span class="text-blue-600">SA</span>
        </div>
        <div class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold">
            Project: Asher-Link
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="mb-8 relative">
            <div class="absolute -inset-4 bg-blue-600/20 blur-2xl rounded-full"></div>
            <i class="fas fa-wifi text-blue-600 text-3xl relative"></i>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">
            Coming to the Streets.
        </h1>
        
        <p class="text-gray-500 text-sm md:text-base max-w-sm mb-12 font-light">
            Prepaid mesh connectivity owned and operated by Oxean SA. High-speed street access, no contracts.
        </p>

        <div class="w-full max-w-md space-y-4">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="email" id="email" placeholder="Email address" class="flex-grow px-5 py-3 rounded-lg text-sm transition-all">
                <button onclick="subscribe()" class="bg-white text-black text-sm font-bold px-8 py-3 rounded-lg hover:bg-gray-200 transition-all">
                    Notify Me
                </button>
            </div>
            <p id="msg" class="text-[10px] text-blue-500 uppercase tracking-widest hidden">Success. Connection Pending.</p>
        </div>
    </main>

    <footer class="p-8 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-white/5">
        <div class="text-[10px] text-gray-600 uppercase tracking-widest">
            © 2024 Oxean SA • Global Infrastructure
        </div>
        <div class="flex gap-6 text-gray-500">
            <a href="#" class="hover:text-white transition"><i class="fab fa-twitter"></i></a>
            <a href="#" class="hover:text-white transition"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </footer>

    <script>
        function subscribe() {
            const email = document.getElementById('email').value;
            if (email.includes('@')) {
                document.getElementById('msg').classList.remove('hidden');
                document.getElementById('email').value = '';
            }
        }
    </script>
</body>
</html>
